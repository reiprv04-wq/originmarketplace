<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>応援購入ありがとうございます！ | ORIGIN</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@400;500;700;900&family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
    
    <style>
        :root {
            --color-atlas: #1E3A5F;
            --color-meridian: #C9A84C;
            --color-pale-steel: #F8FAFC;
            --color-charcoal: #111827;
            --color-white: #FFFFFF;
            
            --font-display: 'Cormorant Garamond', serif;
            --font-editorial: 'Newsreader', serif;
            --font-ui: 'Inter', 'Noto Sans JP', sans-serif;
        }

        body {
            background-color: #F8FAFC;
            color: var(--color-charcoal);
            font-family: var(--font-ui);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .font-display { font-family: var(--font-display); }
        
        .progress-line {
            height: 4px;
            background: #FFD200;
            position: relative;
        }
        .progress-dot {
            width: 14px;
            height: 14px;
            background: #FFD200;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 100%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 0 6px rgba(255, 210, 0, 0.4);
        }

        .btn-atlas {
            background-color: var(--color-atlas);
            color: var(--color-white);
            transition: all 0.2s;
        }
        .btn-atlas:hover { 
            background-color: #162a45;
            transform: translateY(-1px);
        }

        .success-checkmark {
            width: 100px;
            height: 100px;
            margin: 0 auto 2rem;
            background: #10B981;
            border-radius: 50%;
            display: flex;
            items-center: center;
            justify-content: center;
            color: white;
            font-size: 50px;
            animation: bounce 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes bounce {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- Stepper -->
    <div class="bg-white border-b border-gray-100 py-8 px-6">
        <div class="max-w-3xl mx-auto">
            <div class="progress-line rounded-full">
                <div class="progress-dot"></div>
            </div>
            <div class="flex justify-between mt-4 text-[10px] font-bold text-gray-400 uppercase tracking-widest">
                <span>1. Confirm Details</span>
                <span>2. Payment</span>
                <span class="text-gray-900">3. Complete</span>
            </div>
        </div>
    </div>

    <main class="max-w-2xl mx-auto px-6 py-20 text-center">
        
        <div class="success-checkmark flex items-center justify-center">
            <i class="ph ph-check-bold"></i>
        </div>

        <h1 class="text-3xl font-black text-gray-900 mb-4">応援購入が完了しました！</h1>
        <p class="text-gray-500 font-medium mb-12">書類自動化 AI パッケージの応援、誠にありがとうございます。<br/>詳細はご登録のメールアドレスにお送りいたしました。</p>

        <div class="bg-white p-8 rounded-2xl border border-gray-100 shadow-sm mb-12 text-left">
            <h3 class="font-bold text-gray-900 mb-6 border-b border-gray-100 pb-4">注文概要</h3>
            <div class="space-y-4 text-sm font-medium">
                <div class="flex justify-between text-gray-400">
                    <span>注文番号</span>
                    <span class="text-gray-900">#ORG-82755781</span>
                </div>
                <div class="flex justify-between text-gray-400">
                    <span>応援金額</span>
                    <span class="text-gray-900">¥46,900</span>
                </div>
                <div class="flex justify-between text-gray-400">
                    <span>お届け予定</span>
                    <span class="text-gray-900">2026年05月末</span>
                </div>
            </div>
        </div>

        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="index.html" class="px-8 py-4 bg-gray-900 text-white rounded-xl font-bold hover:bg-black transition-colors">
                トップページに戻る
            </a>
            <a href="#" class="px-8 py-4 border border-gray-200 text-gray-700 rounded-xl font-bold hover:bg-gray-50 transition-colors">
                購入履歴を確認
            </a>
        </div>

        <div class="mt-20 pt-20 border-t border-gray-100 opacity-20 flex justify-center gap-10">
            <i class="ph ph-brand-x text-2xl"></i>
            <i class="ph ph-brand-facebook text-2xl"></i>
            <i class="ph ph-brand-slack text-2xl"></i>
        </div>

    </main>

    <footer class="py-12 px-6 opacity-30 text-center">
        <span class="font-display text-2xl font-bold block mb-2">ORIGIN</span>
        <p class="text-[10px] font-bold uppercase tracking-widest">Digital Asset & AI Workflow Marketplace</p>
    </footer>

</body>
</html>
