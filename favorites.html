<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>お気に入り | ORIGIN</title>
    <link href="https://fonts.googleapis.com" rel="preconnect"/><link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@400;500;700;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <style>
        :root{--color-atlas:#1E3A5F;--color-meridian:#C9A84C;--font-display:'Cormorant Garamond',serif;--font-ui:'Inter','Noto Sans JP',sans-serif;--transition:0.2s cubic-bezier(0.4,0,0.2,1);}
        body{background:#F8FAFC;color:#111827;font-family:var(--font-ui);-webkit-font-smoothing:antialiased;}
        .font-display{font-family:var(--font-display);}.bg-atlas{background-color:var(--color-atlas);}.text-atlas{color:var(--color-atlas);}
        .btn-atlas{background-color:var(--color-atlas);color:#fff;transition:var(--transition);}.btn-atlas:hover{background-color:#162a45;transform:translateY(-1px);}
        .price-display{font-family:var(--font-display);font-weight:700;}
        .dash-nav-item{transition:var(--transition);display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;font-size:13px;font-weight:600;color:#6B7280;}
        .dash-nav-item:hover{background:#F3F4F6;color:var(--color-atlas);}
        .dash-nav-item.active{background:#EEF2FF;color:var(--color-atlas);font-weight:700;}
        .asset-card{transition:var(--transition);border:1px solid #E5E7EB;background:#fff;border-radius:12px;}
        .asset-card:hover{transform:translateY(-4px);box-shadow:0 20px 25px -5px rgba(0,0,0,.05);border-color:#D1D5DB;}
    </style>
    <link rel="stylesheet" href="/global-glass.css" />
</head>
<body class="pt-16">
    <header class="fixed top-0 left-0 right-0 z-50 bg-white/95 backdrop-blur-md border-b border-gray-100 h-16">
        <div class="max-w-[1400px] mx-auto px-6 h-full flex items-center justify-between">
            <a href="index.html" class="inline-block group"><img src="/uploads/origin_logo.png" alt="ORIGIN Logo" class="h-20 -my-2 w-auto object-contain group-hover:opacity-80 transition-opacity" style="image-rendering:-webkit-optimize-contrast; image-rendering:crisp-edges;" /></a>
            <div class="flex items-center gap-4">
                <a class="relative p-2 text-gray-400 hover:text-atlas" href="#"><i class="ph ph-bell text-xl"></i></a>
                <a class="relative p-2 text-gray-400 hover:text-atlas" href="cart.html"><i class="ph ph-shopping-cart text-xl"></i></a>
                <div class="w-8 h-8 rounded-full bg-atlas flex items-center justify-center text-white text-xs font-bold cursor-pointer">YY</div>
            </div>
        </div>
    </header>

    <div class="max-w-[1400px] mx-auto px-6 py-8 flex gap-8">
        <aside class="w-56 flex-shrink-0 hidden lg:block">
            <div class="sticky top-24 space-y-1">
                <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-4 px-3">マイページ</p>
                <a class="dash-nav-item" href="buyer-dashboard.html"><i class="ph ph-books text-lg"></i> マイライブラリ</a>
                <a class="dash-nav-item active" href="favorites.html"><i class="ph ph-heart text-lg"></i> お気に入り</a>
                <a class="dash-nav-item" href="history.html"><i class="ph ph-clock-counter-clockwise text-lg"></i> 閲覧履歴</a>
                <a class="dash-nav-item" href="#"><i class="ph ph-receipt text-lg"></i> 購入履歴</a>
                <a class="dash-nav-item" href="#"><i class="ph ph-bell text-lg"></i> 通知</a>
                <div class="border-t border-gray-100 my-4"></div>
                <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-4 px-3">クリエイター</p>
                <a class="dash-nav-item" href="creator-dashboard.html"><i class="ph ph-chart-line-up text-lg"></i> ダッシュボード</a>
                <a class="dash-nav-item" href="sell.html"><i class="ph ph-plus-circle text-lg"></i> 新規出品</a>
            </div>
        </aside>

        <main class="flex-1 min-w-0">
            <h1 class="font-display text-3xl font-bold mb-8">お気に入り</h1>

            <!-- Favorites Grid -->
            <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-5" id="favoritesGrid">
                <div class="col-span-full text-center py-20 text-gray-400 font-bold">読み込み中...</div>
            </div>
        </main>
    </div>

    <footer class="bg-white border-t border-gray-100 py-8 mt-8">
        <div class="max-w-[1400px] mx-auto px-6 flex items-center justify-between">
            <img src="/uploads/origin_logo.png" alt="ORIGIN Logo" class="h-20 -my-2 w-auto object-contain group-hover:opacity-80 transition-opacity" style="image-rendering:-webkit-optimize-contrast; image-rendering:crisp-edges;" />
            <p class="text-xs text-gray-400">© 2026 ORIGIN. All rights reserved.</p>
        </div>
    </footer>
    <script>
        async function loadFavorites() {
            const grid = document.getElementById('favoritesGrid');
            try {
                const favorites = await API.getFavorites();
                if (favorites.length === 0) {
                    grid.innerHTML = '<div class="col-span-full text-center py-20 text-gray-500 font-bold">お気に入りのアセットはありません</div>';
                    return;
                }
                grid.innerHTML = favorites.map(asset => `
                    <a class="asset-card overflow-hidden flex flex-col group" href="product.html?id=${asset.id}">
                        <div class="aspect-[16/10] bg-gray-50 relative overflow-hidden">
                            <button class="absolute top-3 right-3 z-10 bg-white/90 text-red-500 text-sm font-bold p-1.5 rounded-lg hover:bg-red-50 transition-colors" onclick="event.preventDefault(); removeFavorite('${asset.id}')"><i class="ph-fill ph-heart"></i></button>
                            <img alt="${asset.title}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" src="${asset.thumbnail_url || '/uploads/asset_placeholder.png'}" />
                        </div>
                        <div class="p-4 flex-1 flex flex-col">
                            <h3 class="font-bold text-sm mb-1 group-hover:text-atlas transition-colors">${asset.title}</h3>
                            <p class="text-[10px] text-gray-400 font-bold mb-3">${asset.creator_name}</p>
                            <div class="mt-auto flex items-center justify-between pt-3 border-t border-gray-100">
                                <span class="price-display text-lg text-atlas">${formatPrice(asset.price_personal)}</span>
                                <span class="text-xs font-bold text-gray-400">⭐ ${asset.avg_rating || '0.0'}</span>
                            </div>
                        </div>
                    </a>
                `).join('');
            } catch (e) {
                grid.innerHTML = '<div class="col-span-full text-center py-20 text-red-500 font-bold">エラーが発生しました</div>';
            }
        }

        async function removeFavorite(id) {
            if (confirm('お気に入りから削除しますか？')) {
                await API.toggleFavorite(id);
                loadFavorites();
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            initHeaderAuth();
            loadFavorites();
        });
    </script>
</body>
</html>
