<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>購入手続き | ORIGIN</title>
    <link href="https://fonts.googleapis.com" rel="preconnect"/><link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@400;500;700;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="/api-client.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <style>
        :root{--color-atlas:#1E3A5F;--color-meridian:#C9A84C;--font-display:'Cormorant Garamond',serif;--font-ui:'Inter','Noto Sans JP',sans-serif;--transition:0.2s cubic-bezier(0.4,0,0.2,1);}
        body{background:#F8FAFC;color:#111827;font-family:var(--font-ui);-webkit-font-smoothing:antialiased;}
        .font-display{font-family:var(--font-display);}.bg-atlas{background-color:var(--color-atlas);}.text-atlas{color:var(--color-atlas);}
        .btn-atlas{background-color:var(--color-atlas);color:#fff;transition:var(--transition);}.btn-atlas:hover{background-color:#162a45;transform:translateY(-1px);box-shadow:0 4px 12px rgba(30,58,95,.15);}
        .price-display{font-family:var(--font-display);font-weight:700;}
        .step-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;}
        .step-done{background:var(--color-atlas);color:#fff;}.step-active{background:var(--color-atlas);color:#fff;box-shadow:0 0 0 4px rgba(30,58,95,.15);}.step-pending{background:#E5E7EB;color:#9CA3AF;}
        .step-line{height:2px;flex:1;}.step-line-done{background:var(--color-atlas);}.step-line-pending{background:#E5E7EB;}
        .pay-method{transition:all .2s;cursor:pointer;}.pay-method.selected{border-color:var(--color-atlas);background:#EFF6FF;}
    </style>
    <link rel="stylesheet" href="/global-glass.css" />
</head>
<body>
    <!-- Progress Steps -->
    <div class="bg-white border-b border-gray-100 py-6 px-6">
        <div class="max-w-lg mx-auto flex items-center gap-0">
            <div class="step-dot step-done"><i class="ph ph-check"></i></div>
            <div class="step-line step-line-done"></div>
            <div class="step-dot step-active">2</div>
            <div class="step-line step-line-pending"></div>
            <div class="step-dot step-pending">3</div>
        </div>
        <div class="max-w-lg mx-auto flex justify-between mt-3 text-[10px] font-bold uppercase tracking-widest">
            <span class="text-atlas">カート</span>
            <span class="text-atlas">お支払い</span>
            <span class="text-gray-400">完了</span>
        </div>
    </div>

    <main class="max-w-[900px] mx-auto px-6 py-10">
        <h1 class="font-display text-3xl font-bold mb-8">お支払い情報</h1>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Payment Form -->
            <div class="lg:col-span-7 space-y-6">
                <!-- Payment Method Selection -->
                <div class="bg-white border border-gray-100 rounded-2xl p-6">
                    <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest mb-4">お支払い方法</h3>
                    <div class="space-y-3">
                        <div class="pay-method selected border-2 border-atlas rounded-xl p-4 flex items-center gap-4" onclick="selectPayment(this)">
                            <div class="w-10 h-10 bg-blue-50 rounded-lg flex items-center justify-center"><i class="ph ph-credit-card text-atlas text-xl"></i></div>
                            <div class="flex-1"><span class="text-sm font-bold">クレジットカード</span><p class="text-[10px] text-gray-400">Visa, Mastercard, AMEX, JCB</p></div>
                            <i class="ph-fill ph-check-circle text-atlas text-lg"></i>
                        </div>
                        <div class="pay-method border border-gray-200 rounded-xl p-4 flex items-center gap-4" onclick="selectPayment(this)">
                            <div class="w-10 h-10 bg-gray-50 rounded-lg flex items-center justify-center"><i class="ph ph-bank text-gray-400 text-xl"></i></div>
                            <div class="flex-1"><span class="text-sm font-bold">銀行振込</span><p class="text-[10px] text-gray-400">振込確認後にダウンロード可能</p></div>
                        </div>
                    </div>
                </div>

                <!-- Card Details -->
                <div class="bg-white border border-gray-100 rounded-2xl p-6">
                    <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest mb-4">カード情報</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="text-xs font-bold text-gray-600 block mb-1.5">カード番号</label>
                            <div class="relative">
                                <input class="w-full border border-gray-200 rounded-lg px-4 py-3 text-sm outline-none focus:border-atlas/30 focus:ring-2 focus:ring-atlas/5" placeholder="0000 0000 0000 0000" type="text"/>
                                <div class="absolute right-3 top-1/2 -translate-y-1/2 flex gap-1.5">
                                    <div class="w-7 h-5 bg-blue-100 rounded text-[7px] font-bold text-blue-600 flex items-center justify-center">VISA</div>
                                    <div class="w-7 h-5 bg-red-100 rounded text-[7px] font-bold text-red-500 flex items-center justify-center">MC</div>
                                </div>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-xs font-bold text-gray-600 block mb-1.5">有効期限</label>
                                <input class="w-full border border-gray-200 rounded-lg px-4 py-3 text-sm outline-none focus:border-atlas/30 focus:ring-2 focus:ring-atlas/5" placeholder="MM / YY" type="text"/>
                            </div>
                            <div>
                                <label class="text-xs font-bold text-gray-600 block mb-1.5">セキュリティコード</label>
                                <input class="w-full border border-gray-200 rounded-lg px-4 py-3 text-sm outline-none focus:border-atlas/30 focus:ring-2 focus:ring-atlas/5" placeholder="CVV" type="text"/>
                            </div>
                        </div>
                        <div>
                            <label class="text-xs font-bold text-gray-600 block mb-1.5">カード名義</label>
                            <input class="w-full border border-gray-200 rounded-lg px-4 py-3 text-sm outline-none focus:border-atlas/30 focus:ring-2 focus:ring-atlas/5" placeholder="TARO YAMADA" type="text"/>
                        </div>
                    </div>
                </div>

                <!-- Billing -->
                <div class="bg-white border border-gray-100 rounded-2xl p-6">
                    <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest mb-4">請求先情報</h3>
                    <div class="space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="text-xs font-bold text-gray-600 block mb-1.5">姓</label><input class="w-full border border-gray-200 rounded-lg px-4 py-3 text-sm outline-none focus:border-atlas/30" placeholder="山田" type="text"/></div>
                            <div><label class="text-xs font-bold text-gray-600 block mb-1.5">名</label><input class="w-full border border-gray-200 rounded-lg px-4 py-3 text-sm outline-none focus:border-atlas/30" placeholder="太郎" type="text"/></div>
                        </div>
                        <div><label class="text-xs font-bold text-gray-600 block mb-1.5">メールアドレス</label><input class="w-full border border-gray-200 rounded-lg px-4 py-3 text-sm outline-none focus:border-atlas/30" placeholder="taro@example.com" type="email"/></div>
                        <label class="flex items-center gap-2 text-sm text-gray-600"><input type="checkbox" class="accent-atlas rounded"/> インボイス（適格請求書）が必要</label>
                    </div>
                </div>
            </div>

            <!-- Order Summary -->
            <div class="lg:col-span-5">
                <div class="sticky top-8 bg-white border border-gray-100 rounded-2xl p-6 shadow-lg">
                    <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest mb-5">注文内容</h3>
                    <div class="space-y-4 mb-6 pb-6 border-b border-gray-100" id="checkoutItemsContainer">
                        <div class="text-center py-4 text-gray-400 font-bold">読み込み中...</div>
                    </div>
                    <div class="space-y-2 mb-6 pb-6 border-b border-gray-100 text-sm">
                        <div class="flex justify-between"><span class="text-gray-500">小計</span><span class="font-bold" id="checkoutSubtotal">¥0</span></div>
                        <div class="flex justify-between"><span class="text-gray-500">消費税 (10%)</span><span class="font-bold" id="checkoutTax">¥0</span></div>
                    </div>
                    <div class="flex justify-between items-baseline mb-6">
                        <span class="text-sm font-bold">合計</span>
                        <span class="price-display text-3xl text-atlas" id="checkoutTotal">¥0</span>
                    </div>
                    <button class="w-full btn-atlas py-4 rounded-xl font-bold text-base flex items-center justify-center gap-2" id="checkoutBtn"><i class="ph ph-lock-simple"></i> <span id="checkoutBtnAmount">¥0</span> を支払う</button>
                    <p class="text-[10px] text-center text-gray-400 mt-3 flex items-center justify-center gap-1"><i class="ph ph-shield-check"></i> SSL暗号化 · Stripe決済</p>
                    <div class="mt-6 pt-4 border-t border-gray-100">
                        <a class="text-xs font-bold text-gray-400 hover:text-atlas flex items-center gap-1 justify-center" href="cart.html"><i class="ph ph-arrow-left"></i> カートに戻る</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="py-8 px-6 border-t border-gray-100 mt-10">
        <div class="max-w-[900px] mx-auto flex items-center justify-between">
            <img src="/uploads/origin_logo.png" alt="ORIGIN Logo" class="h-20 -my-2 w-auto object-contain group-hover:opacity-80 transition-opacity" style="image-rendering:-webkit-optimize-contrast; image-rendering:crisp-edges;" />
            <p class="text-xs text-gray-400">© 2026 ORIGIN. All rights reserved.</p>
        </div>
    </footer>
    <script>
        function selectPayment(el){
            document.querySelectorAll('.pay-method').forEach(m=>{m.classList.remove('selected');m.style.borderColor='#E5E7EB';m.style.background='#fff';});
            el.classList.add('selected');el.style.borderColor='var(--color-atlas)';el.style.background='#EFF6FF';
        }

        async function loadCheckoutData() {
            if(!requireLogin('/checkout.html')) return;
            const container = document.getElementById('checkoutItemsContainer');
            try {
                const res = await API.getCart();
                if(!res.items || res.items.length === 0) {
                    window.location.href = '/cart.html';
                    return;
                }
                
                let sum = 0;
                container.innerHTML = '';
                for(let item of res.items) {
                    const priceKey = "price_" + item.license_type;
                    const price = item[priceKey] || 0;
                    sum += price;
                    
                    const el = document.createElement('div');
                    el.className = 'flex items-center gap-3';
                    const thumbnailUrl = item.thumbnail_url || 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=600&q=80';
                    el.innerHTML = `
                        <div class="w-12 h-9 rounded-lg bg-gray-100 overflow-hidden flex-shrink-0">
                            <img alt="${item.title}" class="w-full h-full object-cover" src="${thumbnailUrl}"/>
                        </div>
                        <div class="flex-1 min-w-0"><p class="text-xs font-bold truncate">${item.title}</p><p class="text-[10px] text-gray-400">${item.license_type}</p></div>
                        <span class="text-xs font-bold ${price === 0 ? 'text-green-600' : ''}">${price === 0 ? '¥0' : formatPrice(price)}</span>
                    `;
                    container.appendChild(el);
                }
                
                const tax = Math.floor(sum * 0.1);
                const total = sum + tax;
                
                document.getElementById('checkoutSubtotal').textContent = formatPrice(sum);
                document.getElementById('checkoutTax').textContent = formatPrice(tax);
                document.getElementById('checkoutTotal').textContent = formatPrice(total);
                document.getElementById('checkoutBtnAmount').textContent = formatPrice(total);
                
                document.getElementById('checkoutBtn').addEventListener('click', async () => {
                    try {
                        await API.checkout();
                        window.location.href = '/complete.html';
                    } catch(e) {
                        alert('購入処理に失敗しました: ' + e.message);
                    }
                });
            } catch(e) {
                container.innerHTML = '<div class="text-center py-4 text-red-500 font-bold">エラーが発生しました</div>';
            }
        }

        document.addEventListener('DOMContentLoaded', loadCheckoutData);
    </script>
</body>
</html>
